name: Refresh Daily Drive
on:
  schedule:
    # Runs at 6:00 AM AEST (20:00 UTC) and 4:00 PM AEST (06:00 UTC)
    - cron: '0 6,20 * * *'
  workflow_dispatch: 

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Create Config and Token Files
        shell: bash
        run: |
          # 1. Create the config.yaml exactly as you have it on Windows
          cat <<'EOF' > config.yaml
          ${{ secrets.CONFIG_YAML }}
          EOF

          # 2. Create the .spotify-token.json with all 3 required parts.
          # We use "1000" as the expires_at to force an immediate refresh.
          echo '{
            "access_token": "initial_dummy_token",
            "refresh_token": "${{ secrets.SPOTIFY_REFRESH_TOKEN }}",
            "expires_at": 1000
          }' > .spotify-token.json

          # 3. Create a blank state.json
          echo "{}" > state.json

      - name: Run Script
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: npm start
