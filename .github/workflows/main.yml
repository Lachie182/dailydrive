name: Refresh Daily Drive
on:
  schedule:
    # Runs at 20:00 UTC (6 AM AEST) and 06:00 UTC (4 PM AEST)
    - cron: '0 6,20 * * *'
  workflow_dispatch: 

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6 # Updated to v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Using a newer stable Node version

      - name: Install dependencies
        run: npm install

      - name: Create Config and Token Files
        env:
          CONFIG_DATA: ${{ secrets.CONFIG_YAML }}
          REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: |
          # Safely write the config file
          echo "$CONFIG_DATA" > config.yaml
          
          # Create the token file your script expects
          echo "{\"refresh_token\":\"$REFRESH_TOKEN\"}" > .spotify-token.json

      - name: Run Script
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          # Some versions of this script prefer the token as an Env Var too
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: npm start
