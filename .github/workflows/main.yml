name: Refresh Daily Drive
on:
  schedule:
    - cron: '0 6,20 * * *'
  workflow_dispatch: 

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Environment
        shell: bash
        run: |
          # 1. Create the token file exactly as the script expects
          echo "{\"refresh_token\":\"${{ secrets.SPOTIFY_REFRESH_TOKEN }}\"}" > .spotify-token.json
          
          # 2. Create the config file
          cat <<EOF > config.yaml
          ${{ secrets.CONFIG_YAML }}
          EOF

          # 3. "The Doctor's Fix": Manually inject your IDs into the config file 
          # just in case the YAML has placeholders.
          sed -i "s/client_id:.*/client_id: \"${{ secrets.SPOTIFY_CLIENT_ID }}\"/" config.yaml
          sed -i "s/client_secret:.*/client_secret: \"${{ secrets.SPOTIFY_CLIENT_SECRET }}\"/" config.yaml
          sed -i "s/id: \"your-playlist-id-here\"/id: \"${{ secrets.SPOTIFY_PLAYLIST_ID }}\"/" config.yaml

      - name: Run Script
        env:
          # We provide these both ways just to be safe
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: npm start
