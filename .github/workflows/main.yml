name: Refresh Daily Drive
on:
  schedule:
    # Runs at 6:00 AM AEST (20:00 UTC) and 4:00 PM AEST (06:00 UTC)
    - cron: '0 6,20 * * *'
  workflow_dispatch: 

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Create Config and Token Files
        env:
          CONFIG_DATA: ${{ secrets.CONFIG_YAML }}
          REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: |
          # Write the config file
          echo "$CONFIG_DATA" > config.yaml
          
          # Create the .spotify-token.json file with your token string
          echo "{\"refresh_token\":\"$REFRESH_TOKEN\"}" > .spotify-token.json

      - name: Run Script
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: npm start
