name: Refresh Daily Drive
on:
  schedule:
    - cron: '0 6,20 * * *'
  workflow_dispatch: 

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Create Config and Token Files
        shell: bash
        run: |
          # Write config.yaml exactly as it appears in secrets
          cat <<EOF > config.yaml
          ${{ secrets.CONFIG_YAML }}
          EOF

          # Check if the secret is just a string or full JSON
          TOKEN_SECRET='${{ secrets.SPOTIFY_REFRESH_TOKEN }}'
          if [[ $TOKEN_SECRET == {* ]]; then
            # If it's already JSON, write it directly
            echo "$TOKEN_SECRET" > .spotify-token.json
          else
            # If it's just the string, wrap it in JSON
            echo "{\"refresh_token\":\"$TOKEN_SECRET\"}" > .spotify-token.json
          fi

      - name: Verify Files (Debug)
        run: |
          echo "Checking if files exist..."
          ls -a
          if [ -f .spotify-token.json ]; then echo "Token file found."; else echo "Token file MISSING."; fi
          if [ -f config.yaml ]; then echo "Config file found."; else echo "Config file MISSING."; fi

      - name: Run Script
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: npm start
